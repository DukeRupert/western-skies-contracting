services:
  website:
    image: dukerupert/western-skies-contracting:latest
    container_name: western-skies
    restart: unless-stopped
    ports:
      - "${LISTEN_PORT:-3000}:${PORT:-80}"
    environment:
      PORT: "${PORT:-80}"
      APP_PORT: "${APP_PORT:-8080}"
      SITE_CONFIG: "content/site.toml"
      POSTMARK_SERVER_TOKEN: "${POSTMARK_SERVER_TOKEN:-}"
      CONTACT_FROM_EMAIL: "${CONTACT_FROM_EMAIL:-}"
      CONTACT_TO_EMAIL: "${CONTACT_TO_EMAIL:-}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${PORT:-80}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
